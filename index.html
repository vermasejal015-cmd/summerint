<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Client Support System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Support & Query Tracking System</h1>
    </header>

    <div class="container">
        <section class="panel customer-panel">
            <h2>Customer: Log a Complaint</h2>
            <form id="ticketForm">
                <div class="form-group">
                    <label for="clientName">Full Name</label>
                    <input type="text" id="clientName" required placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label for="issueCategory">Issue Category</label>
                    <select id="issueCategory" required>
                        <option value="Technical">Technical Issue</option>
                        <option value="Billing">Billing Inquiry</option>
                        <option value="General">General Question</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="issueDesc">Description</label>
                    <textarea id="issueDesc" rows="4" required placeholder="Describe your issue..."></textarea>
                </div>
                <button type="submit" class="btn">Generate Ticket</button>
            </form>
        </section>

        <section class="panel agent-panel">
            <h2>Agent Dashboard: Open Tickets</h2>
            <div id="ticketContainer" class="ticket-list">
                <p class="empty-state">No open tickets at the moment.</p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>

</html>
